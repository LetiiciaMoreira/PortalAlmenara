<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rio Jequitinhonha - Portal Almenara</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #343a40;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #f7b600;
            color: #ffffff;
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.8em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        main.conteudo {
            flex-grow: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 25px;
        }

        main.conteudo section {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        main.conteudo section p {
            font-size: 1.15em;
            margin-bottom: 30px;
            text-align: justify;
            color: #495057;
        }

        #map {
            height: 550px;
            width: 100%;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .leaflet-marker-icon.praia-da-saudade-marker {
            background-color: #FFD700;
            border: 4px solid #ffffff;
            border-radius: 50%;
            width: 30px !important;
            height: 30px !important;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-left: -15px !important;
            margin-top: -15px !important;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            main.conteudo {
                padding: 0 15px;
            }

            main.conteudo section {
                padding: 25px;
            }

            #map {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Praia da Saudade</h1>
    </header>

    <main class="conteudo">
        <section>
            <p>
                A Praia da Saudade é um local querido em Almenara, oferecendo um ambiente tranquilo para lazer e contato com a natureza às margens do rio. É um ponto popular para relaxar e apreciar a paisagem.
            </p>

            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const centralLatLong = [-16.1807264, -40.6871397];
        
        const map = L.map('map').setView(centralLatLong, 16);

        L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
        }).addTo(map);

        const customIcon = L.divIcon({
            className: 'praia-da-saudade-marker',
            iconSize: [30, 30]
        });

        L.marker(centralLatLong, { icon: customIcon })
            .addTo(map)
            .bindPopup("<b>Praia da Saudade</b><br>Margem do rio, Almenara");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const userLatLng = [pos.coords.latitude, pos.coords.longitude];
                L.marker(userLatLng)
                    .addTo(map)
                    .bindPopup("Você está aqui!")
                    .openPopup();
            }, (err) => {
                console.log("Erro ao obter localização: ", err);
            });
        }
    </script>
</body>
</html>
